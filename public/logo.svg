    </filter>
  </defs>
  <!-- Cat face outer glow -->
  <path d="M100 20 L125 40 Q160 40 170 70 Q185 100 175 130 Q165 165 130 175 Q100 182 70 175 Q35 165 25 130 Q15 100 30 70 Q40 40 75 40 Z"
